<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akhriii Sans Tk Pyaar Krunga</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        
        <header class="main-header">
            <h1 class="main-title">Akhriii Sans Tk Pyaar Krunga</h1>
            <p class="subtitle">A little world made with love for someone who means everything to me 💛</p>
            
            <div class="welcome-box">
                <p>Helloo my jaan! Welcome to my little world 💞</p>
                <button class="click-me-btn">Click Me 💛</button>
                <p class="sub-text">Something cute is waiting for youu ♡</p>
            </div>
        </header>

        <section class="badge-container">
            <div class="badge-card">
                <span class="emoji">⭐</span>
                <div class="badge-text"><strong>Made with</strong><br>Love 💖</div>
            </div>
            <div class="badge-card">
                <span class="emoji">🎀</span>
                <div class="badge-text"><strong>Just for</strong><br>Youu 💖</div>
            </div>
            <div class="badge-card">
                <span class="emoji">🌸</span>
                <div class="badge-text"><strong>Forever</strong><br>Yours 💞</div>
            </div>
        </section>

    </div>

</body>
</html>
